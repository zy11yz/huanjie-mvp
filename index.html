<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#16213e">
    <meta name="description" content="纯文字AI跑团TRPG游戏 - 幻界冒险模拟器">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%231a1a2e' width='192' height='192'/%3E%3Ctext x='96' y='120' font-size='80' text-anchor='middle' fill='%23e94560'%3E%E2%9A%94%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <title>幻界冒险模拟器 - MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #16213e;
            padding: 15px 20px;
            border-bottom: 2px solid #0f3460;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        .output-area {
            flex: 1;
            background-color: #0f0f23;
            border: 1px solid #533483;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            min-height: 300px;
            max-height: 500px;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.6;
        }

        .output-area .log-entry {
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }

        .output-area .log-entry:last-child {
            border-bottom: none;
        }

        /* 战斗结果颜色 */
        .crit { color: #ffd700; font-weight: bold; }      /* 暴击 - 金色 */
        .hit { color: #4caf50; }                          /* 命中 - 绿色 */
        .miss { color: #9e9e9e; }                        /* 未命中 - 灰色 */
        .damage { color: #f44336; }                      /* 伤害 - 红色 */
        .heal { color: #4caf50; }                        /* 治疗 - 绿色 */
        .enemy-hp-low { color: #ff5722; }                /* 敌人低血量 - 橙红 */
        .player-hp-low { color: #f44336; font-weight: bold; } /* 玩家低血量 - 红色加粗 */

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            background-color: #16213e;
            border: 1px solid #533483;
            border-radius: 6px;
            color: #eee;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #e94560;
        }

        .input-area button {
            padding: 12px 25px;
            background-color: #e94560;
            border: none;
            border-radius: 6px;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .input-area button:hover {
            background-color: #ff6b6b;
        }

        /* 响应式布局 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .game-container {
                padding: 10px;
            }

            .output-area {
                min-height: 250px;
                font-size: 13px;
            }

            .input-area {
                flex-direction: column;
            }

            .input-area button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚔️ 幻界冒险模拟器 - MVP</h1>
    </div>

    <div class="game-container">
        <div class="output-area" id="outputArea">
            <div class="log-entry">🎮 欢迎来到幻界冒险模拟器！</div>
            <div class="log-entry">📖 这是一个纯文字AI跑团TRPG游戏。</div>
            <div class="log-entry">💡 在下方输入框中输入指令开始你的冒险...</div>
        </div>

        <div class="input-area">
            <input type="text" id="commandInput" placeholder="输入指令..." />
            <button onclick="submitCommand()">提交</button>
        </div>
    </div>

    <script>
        const outputArea = document.getElementById('outputArea');
        const commandInput = document.getElementById('commandInput');

        // 角色数据
        let player = null;
        let currentEnemy = null;

        // 敌人模板
        const enemies = {
            goblin: {
                name: '哥布林',
                hp: 7,
                maxHp: 7,
                ac: 15,
                attackBonus: 4,
                damageDice: 6,
                damageBonus: 2
            }
        };

        // 加载存档
        function loadGame() {
            const saved = localStorage.getItem('huanjie_player');
            if (saved) {
                player = JSON.parse(saved);
                showCharacterPanel();
                addLogEntry('💾 已加载存档角色');
            }
        }

        // 保存存档
        function saveGame() {
            if (player) {
                localStorage.setItem('huanjie_player', JSON.stringify(player));
                addLogEntry('💾 角色已保存');
            }
        }

        // 4d6取最高3个
        function rollAbilityScore() {
            const rolls = [];
            for (let i = 0; i < 4; i++) {
                rolls.push(Math.floor(Math.random() * 6) + 1);
            }
            rolls.sort((a, b) => b - a);
            return rolls[0] + rolls[1] + rolls[2];
        }

        // 生成属性
        function generateAbilities() {
            return {
                STR: rollAbilityScore(),
                DEX: rollAbilityScore(),
                CON: rollAbilityScore(),
                INT: rollAbilityScore(),
                WIS: rollAbilityScore(),
                CHA: rollAbilityScore()
            };
        }

        // 创建角色
        function createCharacter(name) {
            const abilities = generateAbilities();
            player = {
                name: name,
                class: '战士',
                level: 1,
                hp: 10 + Math.floor((abilities.CON - 10) / 2),
                maxHp: 10 + Math.floor((abilities.CON - 10) / 2),
                abilities: abilities
            };
            saveGame();
            showCharacterPanel();
            return player;
        }

        // 显示角色面板
        function showCharacterPanel() {
            if (!player) return;
            addLogEntry('');
            addLogEntry('╔════════════════════════════════════╗');
            addLogEntry(`║  ⚔️ ${player.name.padEnd(16)} Lv.${player.level} ${player.class.padEnd(6)} ║`);
            addLogEntry('╠════════════════════════════════════╣');
            addLogEntry(`║  HP: ${player.hp}/${player.maxHp}${''.padEnd(22)}║`);
            addLogEntry('╠════════════════════════════════════╣');
            addLogEntry(`║  力量(STR): ${player.abilities.STR.toString().padEnd(3)}  智力(INT): ${player.abilities.INT.toString().padEnd(3)}   ║`);
            addLogEntry(`║  敏捷(DEX): ${player.abilities.DEX.toString().padEnd(3)}  智慧(WIS): ${player.abilities.WIS.toString().padEnd(3)}   ║`);
            addLogEntry(`║  体质(CON): ${player.abilities.CON.toString().padEnd(3)}  魅力(CHA): ${player.abilities.CHA.toString().padEnd(3)}   ║`);
            addLogEntry('╚════════════════════════════════════╝');
        }

        // 生成敌人
        function spawnEnemy(type) {
            const template = enemies[type];
            if (!template) return null;
            return {
                ...template,
                currentHp: template.hp
            };
        }

        // 显示敌人状态
        function showEnemyPanel() {
            if (!currentEnemy) return;
            addLogEntry('');
            addLogEntry('╔════════════════════════════════════╗');
            addLogEntry(`║  👹 ${currentEnemy.name.padEnd(28)} ║`);
            addLogEntry('╠════════════════════════════════════╣');
            addLogEntry(`║  HP: ${currentEnemy.currentHp}/${currentEnemy.maxHp}  AC: ${currentEnemy.ac}${''.padEnd(12)}║`);
            addLogEntry('╚════════════════════════════════════╝');
        }

        // 计算属性修正值
        function getAbilityModifier(score) {
            return Math.floor((score - 10) / 2);
        }

        // 玩家攻击
        function playerAttack() {
            if (!player) {
                addLogEntry('❌ 没有角色，使用 create <名字> 创建');
                return;
            }
            if (!currentEnemy) {
                currentEnemy = spawnEnemy('goblin');
                addLogEntry(`👹 遭遇敌人：${currentEnemy.name}！`);
                showEnemyPanel();
            }

            // 命中判定: d20 + 攻击加值(STR修正 + 熟练加值2)
            const attackRoll = Math.floor(Math.random() * 20) + 1;
            const strMod = getAbilityModifier(player.abilities.STR);
            const profBonus = 2;
            const totalAttack = attackRoll + strMod + profBonus;

            addLogEntry('');
            addLogEntry(`⚔️ ${player.name} 发动攻击！`);
            addLogEntry(`🎲 命中判定: d20(${attackRoll}) + STR(${strMod}) + 熟练(${profBonus}) = ${totalAttack}`);

            if (attackRoll === 1) {
                // 大失败！
                addLogEntry(`💀 大失败！攻击完全落空，你失去平衡...`, 'miss');
                // 敌人获得优势攻击机会
                addLogEntry(`👹 ${currentEnemy.name} 抓住机会反击！`, 'damage');
                enemyAttack(true); // true 表示优势攻击
            } else if (attackRoll === 20) {
                // 暴击！
                const damage1 = Math.floor(Math.random() * 8) + 1;
                const damage2 = Math.floor(Math.random() * 8) + 1;
                const totalDamage = damage1 + damage2 + strMod;
                addLogEntry(`💥 暴击！伤害: 2d8(${damage1}+${damage2}) + STR(${strMod}) = ${totalDamage}`, 'crit');
                currentEnemy.currentHp -= totalDamage;
            } else if (totalAttack >= currentEnemy.ac) {
                // 命中
                const damage = Math.floor(Math.random() * 8) + 1 + strMod;
                addLogEntry(`✅ 命中！伤害: d8(${damage - strMod}) + STR(${strMod}) = ${damage}`, 'hit');
                currentEnemy.currentHp -= damage;
            } else {
                addLogEntry(`❌ 未命中！(需要 ≥ ${currentEnemy.ac})`, 'miss');
            }

            // 检查敌人是否死亡
            if (currentEnemy.currentHp <= 0) {
                addLogEntry(`☠️ ${currentEnemy.name} 被击败了！`);
                currentEnemy = null;
            } else {
                showEnemyPanel();
                // 敌人反击
                enemyAttack();
            }
        }

        // 敌人攻击
        function enemyAttack(advantage = false) {
            if (!currentEnemy || !player) return;

            let attackRoll;
            if (advantage) {
                // 优势：掷两个d20取高
                const roll1 = Math.floor(Math.random() * 20) + 1;
                const roll2 = Math.floor(Math.random() * 20) + 1;
                attackRoll = Math.max(roll1, roll2);
                addLogEntry(`🎲 优势攻击: d20(${roll1}, ${roll2}) 取高 = ${attackRoll}`);
            } else {
                attackRoll = Math.floor(Math.random() * 20) + 1;
            }

            const totalAttack = attackRoll + currentEnemy.attackBonus;
            const playerAC = 10 + getAbilityModifier(player.abilities.DEX); // 基础AC + DEX修正

            addLogEntry('');
            addLogEntry(`👹 ${currentEnemy.name} 发动攻击！`);
            addLogEntry(`🎲 命中判定: d20(${attackRoll}) + ${currentEnemy.attackBonus} = ${totalAttack}`);

            if (totalAttack >= playerAC) {
                const damage = Math.floor(Math.random() * currentEnemy.damageDice) + 1 + currentEnemy.damageBonus;
                addLogEntry(`💢 受到 ${damage} 点伤害！`);
                player.hp -= damage;
                saveGame();

                if (player.hp <= 0) {
                    addLogEntry('💀 你被击败了！游戏结束...');
                    player.hp = 0;
                    currentEnemy = null;
                }
            } else {
                addLogEntry(`🛡️ ${currentEnemy.name} 的攻击被你躲开了！`);
            }

            showCharacterPanel();
        }

        // 短休恢复
        function rest() {
            if (!player) {
                addLogEntry('❌ 没有角色，无法休息');
                return;
            }
            if (player.hp >= player.maxHp) {
                addLogEntry('💚 你的HP已满，不需要休息');
                return;
            }
            const heal = Math.floor(Math.random() * 10) + 1;
            const oldHp = player.hp;
            player.hp = Math.min(player.hp + heal, player.maxHp);
            const actualHeal = player.hp - oldHp;
            saveGame();
            addLogEntry(`💤 短休恢复...`);
            addLogEntry(`💖 恢复了 ${actualHeal} 点HP (${oldHp} → ${player.hp})`, 'heal');
            showCharacterPanel();
        }

        function submitCommand() {
            const command = commandInput.value.trim();
            if (!command) return;

            addLogEntry(`> ${command}`);

            const parts = command.split(' ');
            const cmd = parts[0].toLowerCase();

            switch (cmd) {
                case 'create':
                    // 创建角色 create 名字
                    if (parts.length < 2) {
                        addLogEntry('❌ 用法: create <角色名>');
                    } else {
                        const name = parts.slice(1).join(' ');
                        createCharacter(name);
                        addLogEntry(`✨ 角色「${name}」创建成功！`);
                        showCharacterPanel();
                    }
                    break;

                case 'status':
                    // 查看角色状态
                    if (!player) {
                        addLogEntry('❌ 还没有角色，使用 create <名字> 创建');
                    } else {
                        showCharacterPanel();
                    }
                    break;

                case 'save':
                    // 手动保存
                    if (!player) {
                        addLogEntry('❌ 没有可保存的角色');
                    } else {
                        saveGame();
                    }
                    break;

                case 'attack':
                case 'a':
                    // 攻击
                    playerAttack();
                    break;

                case 'enemy':
                    // 查看敌人状态
                    if (!currentEnemy) {
                        addLogEntry('👻 当前没有敌人');
                    } else {
                        showEnemyPanel();
                    }
                    break;

                case 'rest':
                    // 短休恢复
                    rest();
                    break;

                case 'roll':
                    // 掷骰
                    const rollMatch = command.match(/^roll\s+(\d+)d(\d+)([+-]\d+)?$/i);
                    if (rollMatch) {
                        const numDice = parseInt(rollMatch[1]);
                        const diceSides = parseInt(rollMatch[2]);
                        const modifier = rollMatch[3] ? parseInt(rollMatch[3]) : 0;

                        if (numDice > 0 && numDice <= 100 && diceSides > 0 && diceSides <= 1000) {
                            const result = rollDice(numDice, diceSides, modifier);
                            addLogEntry(result);
                        } else {
                            addLogEntry('❌ 参数错误：骰子数量(1-100)，面数(1-1000)');
                        }
                    } else {
                        addLogEntry('❌ 用法: roll XdY+Z (如: roll 2d6+3)');
                    }
                    break;

                case 'help':
                    addLogEntry('📖 可用指令：');
                    addLogEntry('  create <名字> - 创建战士角色');
                    addLogEntry('  status - 查看角色状态');
                    addLogEntry('  save - 手动保存角色');
                    addLogEntry('  attack / a - 发动攻击');
                    addLogEntry('  enemy - 查看敌人状态');
                    addLogEntry('  rest - 短休恢复HP (1d10)');
                    addLogEntry('  roll XdY+Z - 掷骰子');
                    addLogEntry('  help - 显示帮助');
                    break;

                default:
                    addLogEntry(`🤖 系统：未知指令 "${command}"，输入 help 查看帮助`);
            }

            commandInput.value = '';
        }

        function rollDice(numDice, diceSides, modifier) {
            const rolls = [];
            let total = 0;

            for (let i = 0; i < numDice; i++) {
                const roll = Math.floor(Math.random() * diceSides) + 1;
                rolls.push(roll);
                total += roll;
            }

            total += modifier;

            const modifierStr = modifier !== 0 ? (modifier > 0 ? `+${modifier}` : `${modifier}`) : '';
            return `🎲 掷骰 [${numDice}d${diceSides}${modifierStr}]: ${rolls.join(' + ')}${modifierStr} = ${total}`;
        }

        function addLogEntry(text, className = '') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            if (className) {
                entry.classList.add(className);
            }
            entry.textContent = text;
            outputArea.appendChild(entry);
            outputArea.scrollTop = outputArea.scrollHeight;
        }

        // 回车键提交
        commandInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitCommand();
            }
        });

        // 初始化和加载存档
        addLogEntry('🎮 欢迎来到幻界冒险模拟器！');
        addLogEntry('📖 这是一个纯文字AI跑团TRPG游戏。');
        loadGame();
        if (!player) {
            addLogEntry('💡 提示：输入 "create <名字>" 创建你的战士角色');
        } else {
            addLogEntry('💡 提示：输入 "attack" 或 "a" 开始战斗！');
        }
        addLogEntry('💡 提示：输入 "help" 查看所有指令');

        // 注册 Service Worker (PWA支持)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
